<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}MemorAI — AI-Powered Flashcards{% endblock %}</title>
  <meta name="description" content="{% block description %}Turn any PDF into a smart study deck powered by AI and spaced repetition.{% endblock %}" />
  <link rel="stylesheet" href="/static/css/globals.css" />
  {% block head %}{% endblock %}
</head>
<body>

<!-- ── Navbar ── -->
<nav class="navbar" role="navigation" aria-label="Main navigation">
  <div class="navbar-inner">
    <a href="/" class="navbar-brand" id="brand-logo">MemorAI</a>
    
    {% if user %}
    <div class="navbar-links">
      <a href="/dashboard" class="nav-link" id="nav-dashboard">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>
        Dashboard
      </a>
      <a href="/" class="nav-link" id="nav-home">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
        Upload
      </a>
      <a href="/decks" class="nav-link" id="nav-decks">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
        Decks
      </a>
      <a href="/calendar" class="nav-link" id="nav-calendar">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="18" height="18" x="3" y="4" rx="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>
        Calendar
      </a>
    </div>

    <div style="display: flex; align-items: center; gap: 0.75rem; margin-left: auto">
      <span style="font-size: 0.8rem; color: rgba(240, 240, 255, 0.45); font-family: var(--font-mono)">@{{ user.username }}</span>
      <button id="logout-btn" class="btn btn-secondary btn-sm" style="padding: 0.35rem 0.75rem" aria-label="Sign out">Logout</button>
    </div>
    {% endif %}
  </div>
</nav>

<!-- ── Toast container ── -->
<div id="toast-container" class="toast-container"></div>

<!-- ── Page content ── -->
<main class="page-content">
  {% block content %}{% endblock %}
</main>

<script src="/static/js/app.js"></script>
{% if user %}
<script>
document.getElementById('logout-btn').addEventListener('click', async () => {
  try {
    const res = await fetch('/api/auth/logout', { method: 'POST' });
    if (res.ok) {
      toast.success('Logged out successfully.');
      setTimeout(() => { window.location.href = '/login'; }, 500);
    }
  } catch (err) {
    toast.error('Logout failed.');
  }
});
</script>
{% endif %}
{% block scripts %}{% endblock %}
</body>
</html>
